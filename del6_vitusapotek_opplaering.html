<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Del 6: Vitusapotek Opplæring</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #0f766e;
      --secondary: #14b8a6;
      --accent: #2dd4bf;
      --bg: #f0fdfa;
      --bg-card: #ffffff;
      --text: #134e4a;
      --text-muted: #6b7280;
      --border: #ccfbf1;
      --shadow: rgba(15, 118, 110, 0.1);
    }

    body {
      font-family: 'Manrope', sans-serif;
      background: linear-gradient(135deg, var(--bg) 0%, #f0f9ff 100%);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Navigation */
    .top-nav {
      background: linear-gradient(135deg, #0f766e, #14b8a6);
      padding: 1rem 2rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .nav-container {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .nav-brand {
      color: white;
      font-weight: 700;
      font-size: 1.1rem;
    }

    .nav-links {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .nav-link {
      padding: 0.5rem 1rem;
      background: rgba(255, 255, 255, 0.15);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .nav-link:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: translateY(-1px);
    }

    .nav-link.active {
      background: white;
      color: #0f766e;
    }

    /* Container */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .header h1 {
      font-size: 2.5rem;
      color: var(--primary);
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    /* Timeline */
    .timeline-container {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 4px 12px var(--shadow);
    }

    .timeline {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 2rem;
      position: relative;
    }

    .timeline::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(to right, #10b981, #14b8a6, #f59e0b, #ef4444);
      transform: translateY(-50%);
      z-index: 0;
    }

    .timeline-phase {
      flex: 1;
      text-align: center;
      z-index: 1;
      position: relative;
    }

    .timeline-dot {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: white;
      border: 4px solid;
      margin: 0 auto 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 700;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    .phase-1 .timeline-dot { border-color: #10b981; color: #10b981; }
    .phase-2 .timeline-dot { border-color: #14b8a6; color: #14b8a6; }
    .phase-3 .timeline-dot { border-color: #f59e0b; color: #f59e0b; }
    .phase-4 .timeline-dot { border-color: #ef4444; color: #ef4444; }

    .timeline-label {
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text);
    }

    .timeline-count {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }

    /* Phase Sections */
    .phase-section {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 4px 12px var(--shadow);
    }

    .phase-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid var(--border);
    }

    .phase-title {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .phase-icon {
      font-size: 2rem;
    }

    .phase-title h2 {
      font-size: 1.8rem;
      color: var(--primary);
    }

    .phase-badge {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      padding: 0.5rem 1.5rem;
      border-radius: 12px;
      font-weight: 700;
      font-size: 0.9rem;
    }

    .eqs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 1rem;
    }

    .eqs-item {
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      transition: all 0.2s ease;
      cursor: pointer;
      user-select: none;
    }

    .eqs-item:hover {
      border-color: var(--secondary);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px var(--shadow);
    }

    .eqs-item.completed {
      background: linear-gradient(135deg, #d1fae5, #a7f3d0);
      border-color: #10b981;
    }

    .eqs-checkbox {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
    }

    .checkbox {
      width: 24px;
      height: 24px;
      border: 2px solid var(--primary);
      border-radius: 6px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 2px;
    }

    .checkbox.checked {
      background: var(--primary);
      color: white;
    }

    .eqs-content {
      flex: 1;
    }

    .eqs-code {
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 0.25rem;
    }

    .eqs-title {
      color: var(--text);
      font-weight: 500;
    }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-top: 2rem;
    }

    .stat-card {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      padding: 1.5rem;
      border-radius: 12px;
      text-align: center;
    }

    .stat-value {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
    }

    .stat-label {
      font-size: 0.9rem;
      opacity: 0.9;
    }

    /* Funksjonsansvar Section */
    .funksjon-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
      margin-top: 1.5rem;
    }

    .funksjon-card {
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .funksjon-card:hover {
      border-color: var(--secondary);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px var(--shadow);
    }

    .funksjon-card.completed {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border-color: #f59e0b;
    }

    .funksjon-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1rem;
    }

    .funksjon-title {
      font-weight: 700;
      color: var(--primary);
      font-size: 1.1rem;
    }

    .funksjon-checkbox {
      width: 28px;
      height: 28px;
      border: 2px solid var(--primary);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
    }

    .funksjon-checkbox.checked {
      background: #f59e0b;
      border-color: #f59e0b;
      color: white;
    }

    .funksjon-info {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
    }

    .funksjon-eqs {
      font-size: 0.85rem;
      color: var(--text);
      font-weight: 500;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container {
        padding: 1rem;
      }

      .header h1 {
        font-size: 1.8rem;
      }

      .timeline {
        flex-direction: column;
        gap: 1rem;
      }

      .timeline::before {
        display: none;
      }

      .eqs-grid, .funksjon-grid {
        grid-template-columns: 1fr;
      }
    }

    /* Dark Mode Toggle - Footer Right */
    .theme-toggle {
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      z-index: 10000;
      background: linear-gradient(135deg, #0f766e, #14b8a6);
      border: none;
      border-radius: 50%;
      width: 56px;
      height: 56px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(15, 118, 110, 0.3);
      transition: all 0.3s ease;
      user-select: none;
    }

    .theme-toggle:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 6px 20px rgba(15, 118, 110, 0.4);
    }

    .theme-toggle:active {
      transform: translateY(-1px) scale(0.98);
    }

    .theme-toggle-icon {
      font-size: 1.5rem;
      transition: transform 0.3s ease;
      line-height: 1;
    }

    .theme-toggle:hover .theme-toggle-icon {
      transform: rotate(20deg);
    }

    .theme-toggle-text {
      display: none;
    }

    /* Dark mode styling */
    body.dark-mode .theme-toggle {
      background: linear-gradient(135deg, #1e293b, #334155);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
    }

    body.dark-mode .theme-toggle:hover {
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.6);
    }

    /* Tablet & Mobile */
    @media (max-width: 1024px) {
      .theme-toggle {
        width: 50px;
        height: 50px;
      }
      
      .theme-toggle-icon {
        font-size: 1.3rem;
      }
    }

    @media (max-width: 768px) {
      .theme-toggle {
        width: 48px;
        height: 48px;
        bottom: 0.75rem;
        right: 0.75rem;
      }
      
      .theme-toggle-icon {
        font-size: 1.2rem;
      }
    }

    /* Sticky Footer */
    .sticky-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(135deg, #0f766e, #14b8a6);
      padding: 0.75rem 2rem;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.1);
      z-index: 999;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .footer-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .vitusapotek-logo {
      height: 35px;
      width: auto;
      background: white;
      padding: 4px 8px;
      border-radius: 6px;
    }

    .footer-text {
      color: white;
      font-weight: 600;
      font-size: 0.95rem;
    }

    body {
      padding-bottom: 75px;
    }

    @media (max-width: 768px) {
      .sticky-footer {
        padding: 0.6rem 1rem;
        flex-direction: column;
        gap: 0.5rem;
      }
      
      .vitusapotek-logo {
        height: 28px;
      }
      
      .footer-text {
        font-size: 0.85rem;
      }
      
      body {
        padding-bottom: 100px;
      }
    }

                        /* Countdown Widget */
    .countdown-widget {
      position: fixed;
      top: 80px;
      right: 2rem;
      z-index: 999;
      background: linear-gradient(135deg, #10b981, #14b8a6);
      border-radius: 12px;
      padding: 12px 16px;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
      min-width: 140px;
      text-align: center;
      color: white;
      transition: background 0.3s ease;
    }

    .countdown-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
      opacity: 0.95;
    }

    .countdown-number {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1;
      font-family: 'Manrope', sans-serif;
    }

    .countdown-text {
      font-size: 0.75rem;
      margin-top: 4px;
      opacity: 0.9;
    }

    .countdown-date {
      font-size: 0.65rem;
      margin-top: 4px;
      opacity: 0.8;
    }

    /* Tablet: Smaller, compact version */
    @media (max-width: 1024px) and (min-width: 769px) {
      .countdown-widget {
        top: 70px;
        right: 1rem;
        min-width: 110px;
        padding: 8px 12px;
      }
      
      .countdown-label {
        font-size: 0.6rem;
      }
      
      .countdown-number {
        font-size: 1.5rem;
      }
      
      .countdown-text {
        font-size: 0.65rem;
      }
      
      .countdown-date {
        font-size: 0.6rem;
      }
    }

    /* Mobile: Hide */
    @media (max-width: 768px) {
      .countdown-widget {
        display: none;
      }
    }

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <!-- Supabase Configuration med Smart Retry -->
  <script>
    const SUPABASE_URL = 'https://gkfgdtxxcnryztllhzlh.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdrZmdkdHh4Y25yeXp0bGxoemxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNDI5MzgsImV4cCI6MjA4NzgxODkzOH0.mioTmWUvU8004rdef67gimpfs7ivypnZhBaAar_IBoc';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const STORAGE_KEY = 'vitusapotekOpplaering';
    
    const RETRY_DELAYS = [5000, 10000, 30000, 60000];
    const MAX_AUTO_RETRIES = 10;
    let autoRetryAttempt = 0;
    let retryTimeoutId = null;
    let isSupabaseOnline = true;
    let hasPendingChanges = false;

    async function testSupabaseConnection() {
      try {
        const { data, error } = await supabaseClient.from('praksisplan_data').select('key').limit(1);
        if (!error) {
          if (!isSupabaseOnline) {
            console.log('✅ Supabase tilkobling gjenopprettet!');
            isSupabaseOnline = true;
            autoRetryAttempt = 0;
            if (hasPendingChanges) syncLocalDataToSupabase();
          }
          return true;
        }
        throw error;
      } catch (error) {
        if (isSupabaseOnline) console.warn('⚠️ Supabase utilgjengelig, bruker localStorage');
        isSupabaseOnline = false;
        scheduleAutoRetry();
        return false;
      }
    }

    function scheduleAutoRetry() {
      if (retryTimeoutId || autoRetryAttempt >= MAX_AUTO_RETRIES) {
        if (autoRetryAttempt >= MAX_AUTO_RETRIES) {
          console.log(`⏸️ Automatiske forsøk stoppet (${MAX_AUTO_RETRIES}/${MAX_AUTO_RETRIES})`);
        }
        return;
      }
      const delay = RETRY_DELAYS[Math.min(autoRetryAttempt, RETRY_DELAYS.length - 1)];
      console.log(`🔄 Auto-retry ${autoRetryAttempt + 1}/${MAX_AUTO_RETRIES} om ${delay/1000}s...`);
      retryTimeoutId = setTimeout(async () => {
        retryTimeoutId = null;
        autoRetryAttempt++;
        await testSupabaseConnection();
      }, delay);
    }

    async function retryOnDataChange() {
      hasPendingChanges = true;
      if (!isSupabaseOnline && autoRetryAttempt >= MAX_AUTO_RETRIES) {
        console.log('🔄 Ny endring - prøver Supabase igjen...');
        await testSupabaseConnection();
      }
    }

    async function syncLocalDataToSupabase() {
      const localData = localStorage.getItem(STORAGE_KEY);
      if (localData) {
        try {
          await supabaseClient.from('praksisplan_data').upsert({
            key: STORAGE_KEY,
            data: JSON.parse(localData),
            updated_at: new Date().toISOString()
          }, { onConflict: 'key' });
          console.log('✅ Del 6 data synkronisert til Supabase');
          hasPendingChanges = false;
          if (window.opener && window.opener.triggerSupabaseRetry) {
            window.opener.triggerSupabaseRetry();
          }
        } catch (error) {
          console.error('Kunne ikke synkronisere:', error);

<script>
    // ===================== CONFETTI & CELEBRATIONS =====================
    
    // Trigger confetti
    function fireConfetti(type = 'default') {
      const configs = {
        default: {
          particleCount: 100,
          spread: 70,
          origin: { y: 0.6 }
        },
        milestone: {
          particleCount: 150,
          spread: 100,
          origin: { y: 0.5 },
          colors: ['#10b981', '#14b8a6', '#06b6d4', '#3b82f6']
        },
        complete: {
          particleCount: 200,
          spread: 120,
          origin: { y: 0.4 },
          colors: ['#10b981', '#14b8a6', '#06b6d4', '#f59e0b', '#ef4444']
        }
      };
      
      const config = configs[type] || configs.default;
      confetti(config);
      
      // Side bursts for big celebrations
      if (type === 'complete') {
        setTimeout(() => {
          confetti({ ...config, origin: { x: 0, y: 0.6 } });
          confetti({ ...config, origin: { x: 1, y: 0.6 } });
        }, 250);
      }
    }

    // Check for milestones
    function checkMilestones(completedCount, totalCount) {
      const percentage = Math.round((completedCount / totalCount) * 100);
      const milestones = [25, 50, 75, 100];
      
      milestones.forEach(milestone => {
        const key = `milestone_${milestone}_shown`;
        if (percentage >= milestone && !sessionStorage.getItem(key)) {
          sessionStorage.setItem(key, 'true');
          showCelebration(milestone);
          
          if (milestone === 100) {
            fireConfetti('complete');
          } else {
            fireConfetti('milestone');
          }
        }
      });
    }

    // Show celebration message
    function showCelebration(milestone) {
      const messages = {
        25: '🎉 25% Fullført!',
        50: '🚀 Halvveis der!',
        75: '⭐ 75% Fullført!',
        100: '🏆 GRATULERER! 100%!'
      };
      
      const badge = document.createElement('div');
      badge.className = 'celebration-badge';
      badge.textContent = messages[milestone];
      document.body.appendChild(badge);
      
      setTimeout(() => badge.classList.add('show'), 100);
      
      setTimeout(() => {
        badge.classList.remove('show');
        setTimeout(() => badge.remove(), 500);
      }, 3000);
    }

    // Add ripple effect on click
    function createRipple(event) {
      const button = event.currentTarget;
      const ripple = document.createElement('span');
      const rect = button.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      const x = event.clientX - rect.left - size / 2;
      const y = event.clientY - rect.top - size / 2;
      
      ripple.className = 'ripple';
      ripple.style.width = ripple.style.height = size + 'px';
      ripple.style.left = x + 'px';
      ripple.style.top = y + 'px';
      
      button.style.position = 'relative';
      button.style.overflow = 'hidden';
      button.appendChild(ripple);
      
      setTimeout(() => ripple.remove(), 600);
    }

    // Apply to all clickable elements
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.activity-card, .eqs-item, .course-card, .task-card, .quick-link-btn, .module-link').forEach(el => {
        el.addEventListener('click', createRipple);
      });
    });
</script>

  <script>
    // Confetti celebration on milestones
    function celebrateCompletion(percentage) {
      if (percentage >= 100) {
        confetti({
          particleCount: 200,
          spread: 120,
          origin: { y: 0.6 }
        });
        setTimeout(() => {
          confetti({
            particleCount: 200,
            spread: 120,
            origin: { y: 0.6 }
          });
        }, 300);
      } else if (percentage >= 75 && !localStorage.getItem('celebrated75')) {
        confetti({
          particleCount: 100,
          spread: 70,
          origin: { y: 0.6 }
        });
        localStorage.setItem('celebrated75', 'true');
      } else if (percentage >= 50 && !localStorage.getItem('celebrated50')) {
        confetti({
          particleCount: 80,
          spread: 60,
          origin: { y: 0.6 }
        });
        localStorage.setItem('celebrated50', 'true');
      }
    }
  </script>
</body>
</html>
