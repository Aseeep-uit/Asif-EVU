    .nav-container {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .nav-brand {
      color: white;
      font-weight: 700;
      font-size: 1.1rem;
    }

    .nav-links {

    .nav-link {

      border-radius: 8px;

    .container {

    .header {

    .header h1 {

    .section-header {

    .section-title {

      gap: 1rem;
    }

    .section-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }

    .section-title h2 {
      font-size: 1.8rem;

    .info-box-title {

      font-size: 1.1rem;
      color: var(--primary);

      gap: 0.5rem;

    .info-box-content {
      color: var(--text);

    .progress-overview {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .progress-card {
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.05), rgba(37, 99, 235, 0.1));
      padding: 1.5rem;
      border-radius: 12px;
      text-align: center;

    .progress-value {

    .progress-label {

    }

    .activity-number {

    .activity-description {

    }

    .activity-controls {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);

    .counter-label {

      font-weight: 600;
      color: var(--text-muted);
    }

    .counter-controls {

    .counter-btn {

      color: var(--primary);
      border-radius: 8px;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .counter-btn:hover {

      transform: scale(1.1);
    }

    .counter-value {
      min-width: 50px;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--primary);
    }

    .week-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(45px, 1fr));
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .week-cell {
      aspect-ratio: 1;
      border: 2px solid var(--border);
      background: white;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .week-cell:hover {
      border-color: var(--primary);

    }

    .week-cell.completed {

    .week-label {

      opacity: 0.8;

    .action-buttons {

      gap: 1rem;
      margin-top: 2rem;
      flex-wrap: wrap;

    .btn {

      border: none;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s ease;

    /* Toast Notifications */
    .toast {
      position: fixed;

  <!-- Supabase Configuration med Smart Retry -->
  <script>
    const SUPABASE_URL = 'https://gkfgdtxxcnryztllhzlh.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdrZmdkdHh4Y25yeXp0bGxoemxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNDI5MzgsImV4cCI6MjA4NzgxODkzOH0.mioTmWUvU8004rdef67gimpfs7ivypnZhBaAar_IBoc';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const STORAGE_KEY = 'continuousActivities';
    
    const RETRY_DELAYS = [5000, 10000, 30000, 60000];
    const MAX_AUTO_RETRIES = 10;
    let autoRetryAttempt = 0;
    let retryTimeoutId = null;
    let isSupabaseOnline = true;
    let hasPendingChanges = false;

    async function testSupabaseConnection() {
      try {
        const { data, error } = await supabaseClient.from('praksisplan_data').select('key').limit(1);
        if (!error) {
          if (!isSupabaseOnline) {
            console.log('✅ Supabase tilkobling gjenopprettet!');
            isSupabaseOnline = true;
            autoRetryAttempt = 0;
            if (hasPendingChanges) syncLocalDataToSupabase();
          }
          return true;
        }
        throw error;
      } catch (error) {
        if (isSupabaseOnline) console.warn('⚠️ Supabase utilgjengelig, bruker localStorage');
        isSupabaseOnline = false;
        scheduleAutoRetry();
        return false;
      }
    }

    function scheduleAutoRetry() {
      if (retryTimeoutId || autoRetryAttempt >= MAX_AUTO_RETRIES) {
        if (autoRetryAttempt >= MAX_AUTO_RETRIES) {
          console.log(`⏸️ Automatiske forsøk stoppet (${MAX_AUTO_RETRIES}/${MAX_AUTO_RETRIES})`);
        }
        return;
      }
      const delay = RETRY_DELAYS[Math.min(autoRetryAttempt, RETRY_DELAYS.length - 1)];
      console.log(`🔄 Auto-retry ${autoRetryAttempt + 1}/${MAX_AUTO_RETRIES} om ${delay/1000}s...`);
      retryTimeoutId = setTimeout(async () => {
        retryTimeoutId = null;
        autoRetryAttempt++;
        await testSupabaseConnection();
      }, delay);
    }

    async function retryOnDataChange() {
      hasPendingChanges = true;
      if (!isSupabaseOnline && autoRetryAttempt >= MAX_AUTO_RETRIES) {
        console.log('🔄 Ny endring - prøver Supabase igjen...');
        await testSupabaseConnection();
      }
    }

    async function syncLocalDataToSupabase() {
      const localData = localStorage.getItem(STORAGE_KEY);
      if (localData) {
        try {
          await supabaseClient.from('praksisplan_data').upsert({
            key: STORAGE_KEY,
            data: JSON.parse(localData),
            updated_at: new Date().toISOString()
          }, { onConflict: 'key' });
          console.log('✅ Del 4 data synkronisert til Supabase');
          hasPendingChanges = false;
          if (window.opener && window.opener.triggerSupabaseRetry) {
            window.opener.triggerSupabaseRetry();
          }
        } catch (error) {
          console.error('Kunne ikke synkronisere:', error);
        }
      }
    }

    window.triggerSupabaseRetry = retryOnDataChange;
    testSupabaseConnection();
    

    // Countdown Calculator
    function updateCountdown() {
      const examDate = new Date('2026-06-17T09:00:00');
      const now = new Date();
      const diff = examDate - now;
      const daysLeft = Math.ceil(diff / (1000 * 60 * 60 * 24));
      
      const el = document.getElementById('days-left');
      if (el) {
        el.textContent = daysLeft > 0 ? daysLeft : 0;
        
        // Endre farge basert på tid igjen
        const widget = document.querySelector('.countdown-widget');
        if (widget && daysLeft > 0) {
          if (daysLeft <= 7) {
            widget.style.background = 'linear-gradient(135deg, #ef4444, #dc2626)';
          } else if (daysLeft <= 30) {
            widget.style.background = 'linear-gradient(135deg, #f59e0b, #ef4444)';
          } else {
            widget.style.background = 'linear-gradient(135deg, #10b981, #14b8a6)';
          }
        }
      }
    }

    // Update immediately and every hour
    updateCountdown();
    setInterval(updateCountdown, 3600000);

    // Toast Notification System
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      if (!toast) return;
      
      const icon = type === 'success' ? '✓' : '⚠';
      toast.innerHTML = `<span class="toast-icon">${icon}</span><span>${message}</span>`;
      toast.className = 'toast' + (type === 'error' ? ' error' : '');
      
      setTimeout(() => toast.classList.add('show'), 100);
      
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    console.log('🚀 Del 4 - Supabase med smart retry');
  </script>

  <script type="text/babel">
    const { useState, useMemo } = React;

    const ACTIVITIES_DATA = [
      { id: 1, title: 'Brukerutstyr demonstrasjoner', description: 'Demonstrere bruk av medisinsk utstyr som inhalatorer, injeksjonsutstyr, blodtrykksmålere, etc.' },
      { id: 2, title: 'Medisinstartsamtaler', description: 'Strukturerte samtaler ved oppstart av ny medikasjon.' },
      { id: 3, title: 'Reseptintervensjoner', description: 'Identifisere og løse legemiddelrelaterte problemer.' },
      { id: 4, title: 'Legemidler på registreringsfritak', description: 'Håndtere søknader for ikke-registrerte legemidler.' },
      { id: 5, title: 'Telefonresepter', description: 'Motta og dokumentere resepter via telefon.' },
      { id: 6, title: 'Månedsoppgjør', description: 'Delta i varetelling og økonomisk avstemming.' },
      { id: 7, title: 'Holdbarhets-/tellingskontroll', description: 'Systematisk kontroll av vareholdbarhet.' },
      { id: 8, title: 'Observert vaksinering', description: 'Observere vaksinasjonsprosedyrer.' },
      { id: 9, title: 'Ordre/ekspedering institusjoner', description: 'Bestillinger til sykehjem og legekontor.' },
      { id: 10, title: 'LAR ekspedering', description: 'Legemiddelassistert rehabilitering.' },
      { id: 11, title: 'Tilberedning', description: 'Magistrelle legemidler, mikstur, salver.' },
      { id: 12, title: 'Kompanjearbeid', description: 'Organisere og pakke legemidler.' },
      { id: 13, title: 'Multidose/anbrud', description: 'Håndtere multidosepakker.' }
    ];

    function ContinuousActivities() {
      const [activities, setActivities] = useState(() => {
        return ACTIVITIES_DATA.map(act => ({ ...act, count: 0, weeksDone: [] }));
      });
      const [loading, setLoading] = useState(true);

      // Load from Supabase on mount
      React.useEffect(() => {
        async function loadData() {
          try {
            const { data } = await supabaseClient
              .from('praksisplan_data')
              .select('data')
              .eq('key', STORAGE_KEY)
              .single();

            if (data && data.data) {
              setActivities(data.data);
              localStorage.setItem(STORAGE_KEY, JSON.stringify(data.data));
              console.log('✅ Lastet aktiviteter fra Supabase');
            } else {
              const localData = localStorage.getItem(STORAGE_KEY);
              if (localData) {
                setActivities(JSON.parse(localData));
                console.log('📱 Lastet fra localStorage');
              }
            }
          } catch (error) {
            const localData = localStorage.getItem(STORAGE_KEY);
            if (localData) setActivities(JSON.parse(localData));
          } finally {
            setLoading(false);
          }
        }
        loadData();
      }, []);

      // Save to Supabase when activities change
      React.useEffect(() => {
        if (loading) return;
        
        localStorage.setItem(STORAGE_KEY, JSON.stringify(activities));
        
        async function save() {
          try {
            await supabaseClient.from('praksisplan_data').upsert({
              key: STORAGE_KEY,
              data: activities,
              updated_at: new Date().toISOString()
            }, { onConflict: 'key' });
            console.log('✅ Lagret til Supabase'); showToast('Lagret!');
          } catch (error) {
            console.warn('⚠️ Lagret lokalt');
            retryOnDataChange();
          }
        }
        save();
      }, [activities, loading]);

      const updateActivity = (id, updates) => {
        const newActivities = activities.map(act =>
          act.id === id ? { ...act, ...updates } : act
        );
        setActivities(newActivities);
      };

      const incrementCount = (id) => {
        const activity = activities.find(a => a.id === id);
        updateActivity(id, { count: activity.count + 1 });
      };

      const decrementCount = (id) => {
        const activity = activities.find(a => a.id === id);
        if (activity.count > 0) {
          updateActivity(id, { count: activity.count - 1 });
        }
      };

      const toggleWeek = (id, week) => {
        const activity = activities.find(a => a.id === id);
        const weeksDone = activity.weeksDone || [];
        const newWeeksDone = weeksDone.includes(week)
          ? weeksDone.filter(w => w !== week)
          : [...weeksDone, week];
        updateActivity(id, { weeksDone: newWeeksDone });
      };

      const stats = useMemo(() => {
        const totalCount = activities.reduce((sum, act) => sum + act.count, 0);
        const avgPerActivity = Math.round(totalCount / activities.length);
        const activitiesWithProgress = activities.filter(act => act.count > 0).length;
        const totalWeeksMarked = activities.reduce((sum, act) => sum + (act.weeksDone?.length || 0), 0);
        
        return {
          totalCount,
          avgPerActivity,
          activitiesWithProgress,
          totalActivities: activities.length,
          totalWeeksMarked
        };
      }, [activities]);

      const exportData = () => {
        const data = activities.map(act => ({
          Aktivitet: act.title,
          Antall: act.count,
          'Uker gjennomført': (act.weeksDone || []).map(w => w + 9).join(', ')
        }));
        
        const csv = [
          Object.keys(data[0]).join(';'),
          ...data.map(row => Object.values(row).join(';'))
        ].join('\n');
        
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'kontinuerlige_aktiviteter.csv';
        link.click();
      };

      const resetData = () => {
        if (confirm('Er du sikker på at du vil nullstille alle data? Dette kan ikke angres.')) {
          const resetActivities = ACTIVITIES_DATA.map(act => ({ ...act, count: 0, weeksDone: [] }));
          setActivities(resetActivities);
          localStorage.setItem('continuousActivities', JSON.stringify(resetActivities));
        }
      };

      const weeks = Array.from({ length: 16 }, (_, i) => i);

      return (
        <>
        {loading ? (
          <div className="container" style={{ textAlign: 'center', paddingTop: '4rem' }}>
            <h2>🚀 Laster data...</h2>
          </div>
        ) : (
        <div className="container">
          <div className="header">
            <h1>Praksisplan Apotekpraksis</h1>
            <p className="subtitle">Vår 2026 • Uke 9-24</p>
          </div>

          <div className="main-card">
            <div className="section-header">
              <div className="section-title">
                <div className="section-icon">📊</div>
                <h2>Del 4: Kontinuerlige aktiviteter</h2>
              </div>
              <div className="section-badge">{activities.length} aktiviteter</div>
            </div>

            <div className="info-box">
              <div className="info-box-title">
                ℹ️ Om kontinuerlige aktiviteter
              </div>
              <div className="info-box-content">
                Disse aktivitetene skal gjennomføres <strong>løpende gjennom hele praksisperioden</strong> (uke 9-24). 
                Klikk på ukeboksene for å markere når du har gjennomført aktiviteten, og bruk telleren for å holde oversikt over antall ganger.
              </div>
            </div>

            <div className="progress-overview">
              <div className="progress-card">
                <span className="progress-value">{stats.totalCount}</span>
                <span className="progress-label">Totalt gjennomført</span>
              </div>
              <div className="progress-card">
                <span className="progress-value">{stats.avgPerActivity}</span>
                <span className="progress-label">Snitt per aktivitet</span>
              </div>
              <div className="progress-card">
                <span className="progress-value">{stats.activitiesWithProgress}/{stats.totalActivities}</span>
                <span className="progress-label">Aktiviteter startet</span>
              </div>
              <div className="progress-card">
                <span className="progress-value">{stats.totalWeeksMarked}</span>
                <span className="progress-label">Uker markert</span>
              </div>
            </div>

            {activities.map(activity => (
              <div key={activity.id} className="activity-card">
                <div className="activity-header">
                  <div className="activity-number">{activity.id}</div>
                  <div className="activity-info">
                    <div className="activity-title">{activity.title}</div>
                    <div className="activity-description">{activity.description}</div>
                  </div>
                </div>

                <div className="activity-controls">
                  <span className="counter-label">Antall ganger:</span>
                  <div className="counter-controls">
                    <button className="counter-btn" onClick={() => decrementCount(activity.id)}>−</button>
                    <div className="counter-value">{activity.count}</div>
                    <button className="counter-btn" onClick={() => incrementCount(activity.id)}>+</button>
                  </div>
                </div>

                <div className="week-grid">
                  {weeks.map(week => (
                    <div
                      key={week}
                      className={`week-cell ${(activity.weeksDone || []).includes(week) ? 'completed' : ''}`}
                      onClick={() => toggleWeek(activity.id, week)}
                    >
                      <div>{week + 9}</div>
                      <div className="week-label">Uke</div>
                    </div>
                  ))}
                </div>
              </div>
            ))}

            <div className="action-buttons">
              <button className="btn btn-primary" onClick={exportData}>
                📥 Eksporter til CSV
              </button>
              <button className="btn btn-secondary" onClick={resetData}>
                🔄 Nullstill data
              </button>
            </div>
          </div>
        </div>
        )}
        </>
      );
    }

    ReactDOM.render(<ContinuousActivities />, document.getElementById('root'));
  </script>

  <script>
    function toggleDarkMode() {
      document.body.classList.toggle('dark-mode');
      const isDark = document.body.classList.contains('dark-mode');
      document.getElementById('theme-icon').textContent = isDark ? '☀️' : '🌙';
      document.getElementById('theme-text').textContent = isDark ? 'Light Mode' : 'Dark Mode';
      localStorage.setItem('darkMode', isDark ? 'enabled' : 'disabled');
    }

    window.addEventListener('DOMContentLoaded', () => {
      if (localStorage.getItem('darkMode') === 'enabled') {
        document.body.classList.add('dark-mode');
        document.getElementById('theme-icon').textContent = '☀️';
        document.getElementById('theme-text').textContent = 'Light Mode';
      }
    });
  </script>
<script>
    // ===================== CONFETTI & CELEBRATIONS =====================
    
    // Trigger confetti
    function fireConfetti(type = 'default') {
      const configs = {
        default: {
          particleCount: 100,
          spread: 70,
          origin: { y: 0.6 }
        },
        milestone: {
          particleCount: 150,
          spread: 100,
          origin: { y: 0.5 },
          colors: ['#10b981', '#14b8a6', '#06b6d4', '#3b82f6']
        },
        complete: {
          particleCount: 200,
          spread: 120,
          origin: { y: 0.4 },
          colors: ['#10b981', '#14b8a6', '#06b6d4', '#f59e0b', '#ef4444']
        }
      };
      
      const config = configs[type] || configs.default;
      confetti(config);
      
      // Side bursts for big celebrations
      if (type === 'complete') {
        setTimeout(() => {
          confetti({ ...config, origin: { x: 0, y: 0.6 } });
          confetti({ ...config, origin: { x: 1, y: 0.6 } });
        }, 250);
      }
    }

    // Check for milestones
    function checkMilestones(completedCount, totalCount) {
      const percentage = Math.round((completedCount / totalCount) * 100);
      const milestones = [25, 50, 75, 100];
      
      milestones.forEach(milestone => {
        const key = `milestone_${milestone}_shown`;
        if (percentage >= milestone && !sessionStorage.getItem(key)) {
          sessionStorage.setItem(key, 'true');
          showCelebration(milestone);
          
          if (milestone === 100) {
            fireConfetti('complete');
          } else {
            fireConfetti('milestone');
          }
        }
      });
    }

    // Show celebration message
    function showCelebration(milestone) {
      const messages = {
        25: '🎉 25% Fullført!',
        50: '🚀 Halvveis der!',
        75: '⭐ 75% Fullført!',
        100: '🏆 GRATULERER! 100%!'
      };
      
      const badge = document.createElement('div');
      badge.className = 'celebration-badge';
      badge.textContent = messages[milestone];
      document.body.appendChild(badge);
      
      setTimeout(() => badge.classList.add('show'), 100);
      
      setTimeout(() => {
        badge.classList.remove('show');
        setTimeout(() => badge.remove(), 500);
      }, 3000);
    }

    // Add ripple effect on click
    function createRipple(event) {
      const button = event.currentTarget;
      const ripple = document.createElement('span');
      const rect = button.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      const x = event.clientX - rect.left - size / 2;
      const y = event.clientY - rect.top - size / 2;
      
      ripple.className = 'ripple';
      ripple.style.width = ripple.style.height = size + 'px';
      ripple.style.left = x + 'px';
      ripple.style.top = y + 'px';
      
      button.style.position = 'relative';
      button.style.overflow = 'hidden';
      button.appendChild(ripple);
      
      setTimeout(() => ripple.remove(), 600);
    }

    // Apply to all clickable elements
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.activity-card, .eqs-item, .course-card, .task-card, .quick-link-btn, .module-link').forEach(el => {
        el.addEventListener('click', createRipple);
      });
    });
</script>

  <script>
    // Confetti celebration on milestones
    function celebrateCompletion(percentage) {
      if (percentage >= 100) {
        confetti({
          particleCount: 200,
          spread: 120,
          origin: { y: 0.6 }
        });
        setTimeout(() => {
          confetti({
            particleCount: 200,
            spread: 120,
            origin: { y: 0.6 }
          });
        }, 300);
      } else if (percentage >= 75 && !localStorage.getItem('celebrated75')) {
        confetti({
          particleCount: 100,
          spread: 70,
          origin: { y: 0.6 }
        });
        localStorage.setItem('celebrated75', 'true');
      } else if (percentage >= 50 && !localStorage.getItem('celebrated50')) {
        confetti({
          particleCount: 80,
          spread: 60,
          origin: { y: 0.6 }
        });
        localStorage.setItem('celebrated50', 'true');
      }
    }
  </script>
