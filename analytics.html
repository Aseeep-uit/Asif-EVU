  <script>
    // Countdown Calculator - OSCE Eksamen
    function updateCountdown() {
      const examDate = new Date('2026-06-17T09:00:00');
      const now = new Date();
      const diff = examDate - now;
      const daysLeft = Math.ceil(diff / (1000 * 60 * 60 * 24));
      
      const el = document.getElementById('days-left');
      console.log('Countdown update:', { daysLeft, elementFound: !!el });
      
      if (el) {
        el.textContent = daysLeft > 0 ? daysLeft : 0;
        
        // Endre farge basert på tid igjen
        const widget = document.querySelector('.countdown-widget');
        if (widget && daysLeft > 0) {
          if (daysLeft <= 7) {
            widget.style.background = 'linear-gradient(135deg, #ef4444, #dc2626)';
          } else if (daysLeft <= 30) {
            widget.style.background = 'linear-gradient(135deg, #f59e0b, #ef4444)';
          } else {
            widget.style.background = 'linear-gradient(135deg, #10b981, #14b8a6)';
          }
        }
      }
    }

    // Update countdown when DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', updateCountdown);
    } else {
      updateCountdown();
    }
    
    // Update every hour
    setInterval(updateCountdown, 3600000);

    function toggleDarkMode() {
      document.body.classList.toggle('dark-mode');
      const isDark = document.body.classList.contains('dark-mode');
      document.getElementById('theme-icon').textContent = isDark ? '☀️' : '🌙';
      document.getElementById('theme-text').textContent = isDark ? 'Light Mode' : 'Dark Mode';
      localStorage.setItem('darkMode', isDark ? 'enabled' : 'disabled');
    }

    window.addEventListener('DOMContentLoaded', () => {
      if (localStorage.getItem('darkMode') === 'enabled') {
        document.body.classList.add('dark-mode');
        document.getElementById('theme-icon').textContent = '☀️';
        document.getElementById('theme-text').textContent = 'Light Mode';
      }

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    // Funksjon for å hente alle fullførte items fra Supabase
    async function getAllCompletedItems() {
      try {
        // Hent data for alle kjente keys
        const keys = [
          'egenomsorgsActivities',      // Del 1
          'resepturActivities',          // Del 2
          'arbeidskravCompleted',        // Del 3
          'continuousActivities',        // Del 4
          'apokusCourses',              // Del 5
          'vitusapotekOpplaering',      // Del 6
          'ganttCompletedTasks'         // Gantt
        ];
        
        const { data, error } = await supabaseClient
          .from('praksisplan_data')
          .select('*')
          .in('key', keys);
        
        if (error) throw error;
        
        // Kombiner alle fullførte items
        let allCompleted = new Set();
        let completionLog = [];
        
        data.forEach(item => {
          const itemData = item.data || item.value;
          
          if (!itemData) return;
          
          console.log('📦 Processing module:', item.key, itemData);
          
          // Del 1, 2, 3, 4, 5, Gantt har 'items' array
          if (itemData.items && Array.isArray(itemData.items)) {
            itemData.items.forEach(id => {
              allCompleted.add(id);
            });
          }
          
          // Del 6 har 'eqs' og 'funksjon' arrays
          if (item.key === 'vitusapotekOpplaering') {
            if (itemData.eqs && Array.isArray(itemData.eqs)) {
              itemData.eqs.forEach(eqsCode => {
                allCompleted.add('del6-eqs-' + eqsCode);
              });
            }
            if (itemData.funksjon && Array.isArray(itemData.funksjon)) {
              itemData.funksjon.forEach(funkId => {
                allCompleted.add('del6-funk-' + funkId);
              });
            }
          }
          
          // Completion log
          if (itemData.completionLog && Array.isArray(itemData.completionLog)) {
            completionLog = completionLog.concat(itemData.completionLog);
          }
        });
        
        console.log('📊 Analytics data loaded:', {
          totalItems: allCompleted.size,
          modulesFound: data.length,
          modules: data.map(d => d.key),
          hasLog: completionLog.length > 0
        });
        
        return {
          completed: Array.from(allCompleted),
          log: completionLog.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp))
        };
      } catch (error) {
        console.error('Error fetching from Supabase:', error);
        // Fallback til localStorage
        return {
          completed: [],
          log: JSON.parse(localStorage.getItem('completionLog') || '[]')
        };
      }
    }
    
    // Gjør funksjonen tilgjengelig globalt
    window.getAllCompletedItems = getAllCompletedItems;
  </script>

<script type="text/babel">
    const { useState, useEffect } = React;

    function AnalyticsDashboard() {
      const [stats, setStats] = useState({
        totalCompleted: 0,
        totalItems: 254,
        currentStreak: 0,
        avgPerDay: 0,
        daysToCompletion: 0
      });

      useEffect(() => {
        // Load data from Supabase
        async function loadData() {
          const { completed, log } = await window.getAllCompletedItems();
          
          // Calculate stats
          const totalCompleted = completed.length;
        const streak = calculateStreak(log);
          const avgPerDay = calculateAvgPerDay(log);
        const remaining = 254 - totalCompleted;
        const daysToCompletion = avgPerDay > 0 ? Math.ceil(remaining / avgPerDay) : 0;

        setStats({
          totalCompleted,
          totalItems: 254,
          currentStreak: streak,
          avgPerDay: avgPerDay.toFixed(1),
          daysToCompletion
        });

        // Initialize charts
        setTimeout(() => {
          initCharts(log, completed);
        }, 100);
      }
      
      loadData();
    }, []);

      function calculateStreak(log) {
        if (log.length === 0) return 0;
        
        const today = new Date().setHours(0,0,0,0);
        let streak = 0;
        let currentDate = today;
        
        while (true) {
          const hasActivity = log.some(item => {
            const itemDate = new Date(item.timestamp).setHours(0,0,0,0);
            return itemDate === currentDate;
          });
          
          if (!hasActivity) break;
          streak++;
          currentDate -= 24 * 60 * 60 * 1000;
        }
        
        return streak;
      }

      function calculateAvgPerDay(log) {
        if (log.length === 0) return 0;
        
        const firstDate = new Date(log[0].timestamp);
        const lastDate = new Date(log[log.length - 1].timestamp);
        const daysDiff = Math.max(1, Math.ceil((lastDate - firstDate) / (1000 * 60 * 60 * 24)));
        
        return log.length / daysDiff;
      }

      function initCharts(log, completed) {
        // Progress Over Time Chart
        const progressCtx = document.getElementById('progressChart');
        if (progressCtx) {
          const dates = [];
          const counts = [];
          
          log.forEach((item, index) => {
            const date = new Date(item.timestamp).toLocaleDateString('no-NO');
            if (!dates.includes(date)) {
              dates.push(date);
              counts.push(index + 1);
            }
          });

          new Chart(progressCtx, {
            type: 'line',
            data: {
              labels: dates.slice(-30),
              datasets: [{
                label: 'Totalt fullført',
                data: counts.slice(-30),
                borderColor: '#14b8a6',
                backgroundColor: 'rgba(20, 184, 166, 0.1)',
                tension: 0.4,
                fill: true
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: { display: false }
              },
              scales: {
                y: { beginAtZero: true }
              }
            }
          });
        }

        // Module Progress Chart - with real data
        const moduleCtx = document.getElementById('moduleChart');
        if (moduleCtx) {
          // Calculate real module progress
          const modules = {
            'Del 1': { total: 32, prefix: 'del1-' },
            'Del 2': { total: 41, prefix: 'del2-' },
            'Del 3': { total: 9, prefix: 'del3-' },
            'Del 4': { total: 13, prefix: 'del4-' },
            'Del 5': { total: 78, prefix: 'del5-' },
            'Del 6 EQS': { total: 34, prefix: 'del6-eqs-' },
            'Del 6 Ansvar': { total: 10, prefix: 'del6-funk-' },
            'Gantt': { total: 37, prefix: 'gantt-' }
          };
          
          const moduleProgress = Object.entries(modules).map(([name, config]) => {
            const completedCount = completed.filter(id => id.startsWith(config.prefix)).length;
            return Math.round((completedCount / config.total) * 100);
          });
          
          new Chart(moduleCtx, {
            type: 'bar',
            data: {
              labels: ['Del 1', 'Del 2', 'Del 3', 'Del 4', 'Del 5', 'Del 6 EQS', 'Del 6 Ansvar', 'Gantt'],
              datasets: [{
                label: 'Fullført (%)',
                data: moduleProgress,
                backgroundColor: [
                  '#06b6d4',
                  '#a855f7',
                  '#10b981',
                  '#f59e0b',
                  '#84cc16',
                  '#8b5cf6',
                  '#ec4899',
                  '#f43f5e'
                ]
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: { display: false }
              },
              scales: {
                y: { 
                  beginAtZero: true,
                  max: 100
                }
              }
            }
          });
        }
      }

      return (
        <div className="container">
          <div className="page-header">
            <h1 className="page-title">📊 Analytics Dashboard</h1>
            <p className="page-subtitle">Detaljert statistikk og fremgang</p>
          </div>

          {/* Stats Grid */}
          <div className="stats-grid">
            <div className="stat-card">
              <div className="stat-label">Totalt fullført</div>
              <div className="stat-value">{stats.totalCompleted}</div>
              <div className="stat-change positive">av {stats.totalItems} elementer</div>
            </div>

            <div className="stat-card">
              <div className="stat-label">Nåværende streak</div>
              <div className="stat-value">{stats.currentStreak} 🔥</div>
              <div className="stat-change">dager på rad</div>
            </div>

            <div className="stat-card">
              <div className="stat-label">Gjennomsnitt per dag</div>
              <div className="stat-value">{stats.avgPerDay}</div>
              <div className="stat-change">elementer/dag</div>
            </div>

            <div className="stat-card">
              <div className="stat-label">Estimert tid til 100%</div>
              <div className="stat-value">{stats.daysToCompletion}</div>
              <div className="stat-change">dager igjen</div>
            </div>
          </div>

          {/* Charts */}
          <div className="charts-grid">
            <div className="chart-card">
              <h3 className="chart-title">📈 Fremgang over tid</h3>
              <div className="chart-container">
                <canvas id="progressChart"></canvas>
              </div>
            </div>

            <div className="chart-card">
              <h3 className="chart-title">📊 Fremgang per modul</h3>
              <div className="chart-container">
                <canvas id="moduleChart"></canvas>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<AnalyticsDashboard />, document.getElementById('root'));
  </script>
</body>
</html>
