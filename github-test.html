<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub API Test</title>
  <script src="config.js"></script>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background: #f0fdfa;
    }
    .test-card {
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }
    h1 {
      color: #0f766e;
    }
    .test-item {
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      border-left: 4px solid #94a3b8;
    }
    .test-item.pending {
      background: #fff7ed;
      border-color: #f59e0b;
    }
    .test-item.success {
      background: #f0fdf4;
      border-color: #10b981;
    }
    .test-item.error {
      background: #fef2f2;
      border-color: #ef4444;
    }
    button {
      background: #0f766e;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      margin: 10px 5px 10px 0;
    }
    button:hover {
      background: #14b8a6;
    }
    pre {
      background: #1e293b;
      color: #e2e8f0;
      padding: 15px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="test-card">
    <h1>🧪 GitHub API Test</h1>
    <p>Test GitHub synkronisering før deployment</p>

    <div id="config-test" class="test-item">
      ⏳ Sjekker config...
    </div>

    <div id="read-test" class="test-item">
      ⏳ Test lesing fra GitHub...
    </div>

    <div id="write-test" class="test-item">
      ⏳ Test skriving til GitHub...
    </div>

    <button onclick="runTests()">▶️ Kjør tester</button>
    <button onclick="location.reload()">🔄 Kjør på nytt</button>

    <div id="results" style="margin-top: 20px;"></div>
  </div>

  <script>
    async function runTests() {
      // Test 1: Config
      const configTest = document.getElementById('config-test');
      if (typeof GITHUB_CONFIG !== 'undefined' && GITHUB_CONFIG.token) {
        configTest.className = 'test-item success';
        configTest.textContent = '✅ Config lastet - Token funnet';
      } else {
        configTest.className = 'test-item error';
        configTest.textContent = '❌ Config mangler - Sjekk at config.js er lastet';
        return;
      }

      // Test 2: Les fra GitHub
      const readTest = document.getElementById('read-test');
      readTest.className = 'test-item pending';
      readTest.textContent = '⏳ Tester lesing fra GitHub...';

      try {
        const response = await fetch(
          `https://api.github.com/repos/${GITHUB_CONFIG.username}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.dataFile}`,
          {
            headers: {
              'Authorization': `token ${GITHUB_CONFIG.token}`,
              'Accept': 'application/vnd.github.v3+json'
            }
          }
        );

        if (response.status === 404) {
          readTest.className = 'test-item pending';
          readTest.textContent = '⚠️ data.json finnes ikke ennå - vil bli opprettet';
        } else if (response.ok) {
          const data = await response.json();
          readTest.className = 'test-item success';
          readTest.textContent = '✅ Lesing OK - data.json funnet';
          
          const resultsDiv = document.getElementById('results');
          const content = atob(data.content);
          resultsDiv.innerHTML = `<h3>📄 Innhold i data.json:</h3><pre>${content}</pre>`;
        } else {
          throw new Error(`HTTP ${response.status}`);
        }
      } catch (error) {
        readTest.className = 'test-item error';
        readTest.textContent = `❌ Lesing feilet: ${error.message}`;
        return;
      }

      // Test 3: Skriv til GitHub
      const writeTest = document.getElementById('write-test');
      writeTest.className = 'test-item pending';
      writeTest.textContent = '⏳ Tester skriving til GitHub...';

      try {
        const testData = {
          lastUpdated: new Date().toISOString(),
          del1_egenomsorg: [],
          del2_reseptur: [],
          del3_arbeidskrav: [],
          del4_kontinuerlige: [],
          del5_apokus: [],
          gantt_completed: [],
          _test: `Test fra API tester - ${new Date().toLocaleString('no-NO')}`
        };

        const content = JSON.stringify(testData, null, 2);
        const encodedContent = btoa(unescape(encodeURIComponent(content)));

        // Hent gjeldende SHA hvis filen eksisterer
        let currentSha = null;
        try {
          const existingFile = await fetch(
            `https://api.github.com/repos/${GITHUB_CONFIG.username}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.dataFile}`,
            {
              headers: {
                'Authorization': `token ${GITHUB_CONFIG.token}`,
                'Accept': 'application/vnd.github.v3+json'
              }
            }
          );
          if (existingFile.ok) {
            const fileData = await existingFile.json();
            currentSha = fileData.sha;
          }
        } catch (e) {
          // Filen eksisterer ikke, det er ok
        }

        const body = {
          message: `Test commit fra API tester - ${new Date().toLocaleString('no-NO')}`,
          content: encodedContent,
          branch: GITHUB_CONFIG.branch
        };

        if (currentSha) {
          body.sha = currentSha;
        }

        const writeResponse = await fetch(
          `https://api.github.com/repos/${GITHUB_CONFIG.username}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.dataFile}`,
          {
            method: 'PUT',
            headers: {
              'Authorization': `token ${GITHUB_CONFIG.token}`,
              'Accept': 'application/vnd.github.v3+json',
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(body)
          }
        );

        if (writeResponse.ok) {
          const result = await writeResponse.json();
          writeTest.className = 'test-item success';
          writeTest.textContent = '✅ Skriving OK - data.json oppdatert på GitHub';
          
          const resultsDiv = document.getElementById('results');
          resultsDiv.innerHTML += `
            <h3>✅ Alle tester bestått!</h3>
            <p>GitHub synkronisering fungerer perfekt.</p>
            <p><strong>Sjekk GitHub:</strong> <a href="https://github.com/${GITHUB_CONFIG.username}/${GITHUB_CONFIG.repo}/blob/${GITHUB_CONFIG.branch}/${GITHUB_CONFIG.dataFile}" target="_blank">Se data.json</a></p>
          `;
        } else {
          const errorData = await writeResponse.json();
          throw new Error(`HTTP ${writeResponse.status}: ${errorData.message}`);
        }

      } catch (error) {
        writeTest.className = 'test-item error';
        writeTest.textContent = `❌ Skriving feilet: ${error.message}`;
      }
    }

    // Kjør tester automatisk ved lasting
    window.addEventListener('load', () => {
      setTimeout(runTests, 500);
    });
  </script>
</body>
</html>
