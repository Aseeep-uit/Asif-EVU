<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apotekpraksis Gantt-plan</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --apotek-primary: #0a5f4e;
      --apotek-secondary: #1a8f7a;
      --apotek-accent: #2dd4a8;
      --farmakoterapi: #d94848;
      --kommunikasjon: #4878d9;
      --lovverk: #d9a548;
      --bg-light: #fafbf9;
      --bg-dark: #e8f2ef;
      --text-primary: #1a2e27;
      --text-secondary: #5a6e67;
      --border: #c5d9d2;
      --shadow: rgba(10, 95, 78, 0.08);
    }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: linear-gradient(135deg, var(--bg-light) 0%, var(--bg-dark) 100%);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 0;
      margin: 0;
    }

    /* Navigation */
    .top-nav {
      background: linear-gradient(135deg, #0f766e, #14b8a6);
      padding: 1rem 2rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .nav-container {
      max-width: 1600px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .nav-brand {
      color: white;
      font-weight: 700;
      font-size: 1.1rem;
    }

    .nav-links {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .nav-link {
      padding: 0.5rem 1rem;
      background: rgba(255, 255, 255, 0.15);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .nav-link:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: translateY(-1px);
    }

    .nav-link.active {
      background: white;
      color: #0f766e;
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
      padding: 2rem;
    }

    @media (max-width: 768px) {
      .nav-container {
        flex-direction: column;
        align-items: stretch;
      }
      .nav-links {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.25rem;
      }
      .nav-link {
        text-align: center;
        padding: 0.5rem 0.25rem;
        font-size: 0.75rem;
      }
    }

    .header {
      margin-bottom: 3rem;
      text-align: center;
      position: relative;
    }

    .header::before {
      content: '';
      position: absolute;
      top: -1rem;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 4px;
      background: linear-gradient(90deg, var(--apotek-primary), var(--apotek-accent));
      border-radius: 2px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3.5rem;
      font-weight: 900;
      color: var(--apotek-primary);
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 1.1rem;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .controls {
      background: white;
      padding: 2rem;
      border-radius: 16px;
      margin-bottom: 2rem;
      box-shadow: 0 4px 24px var(--shadow);
      border: 1px solid var(--border);
    }

    .filter-section {
      margin-bottom: 1.5rem;
    }

    .filter-label {
      font-weight: 600;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--apotek-primary);
      margin-bottom: 0.75rem;
      display: block;
    }

    .pill-group {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .pill {
      padding: 0.6rem 1.2rem;
      border-radius: 24px;
      border: 2px solid;
      background: white;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s ease;
      user-select: none;
    }

    .pill:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px var(--shadow);
    }

    .pill.active {
      transform: scale(1.05);
      box-shadow: 0 4px 16px var(--shadow);
    }

    .pill.farmakoterapi {
      border-color: var(--farmakoterapi);
      color: var(--farmakoterapi);
    }

    .pill.farmakoterapi.active {
      background: var(--farmakoterapi);
      color: white;
    }

    .pill.kommunikasjon {
      border-color: var(--kommunikasjon);
      color: var(--kommunikasjon);
    }

    .pill.kommunikasjon.active {
      background: var(--kommunikasjon);
      color: white;
    }

    .pill.lovverk {
      border-color: var(--lovverk);
      color: var(--lovverk);
    }

    .pill.lovverk.active {
      background: var(--lovverk);
      color: white;
    }

    .pill.fase {
      border-color: var(--apotek-primary);
      color: var(--apotek-primary);
    }

    .pill.fase.active {
      background: var(--apotek-primary);
      color: white;
    }

    .gantt-container {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 8px 32px var(--shadow);
      overflow-x: auto;
      border: 1px solid var(--border);
    }

    .gantt-header {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 2rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid var(--border);
    }

    .week-labels {
      display: grid;
      grid-template-columns: repeat(16, 1fr);
      gap: 0.25rem;
      font-weight: 600;
      font-size: 0.8rem;
      color: var(--text-secondary);
      text-align: center;
    }

    .week-label {
      padding: 0.5rem 0.25rem;
      border-radius: 6px;
      transition: background 0.2s ease;
    }

    .week-label:hover {
      background: var(--bg-dark);
    }

    .gantt-row {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 2rem;
      padding: 1rem 0;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s ease;
      animation: fadeIn 0.4s ease forwards;
      opacity: 0;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .gantt-row:hover {
      background: var(--bg-light);
    }

    .task-info {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .task-title {
      font-weight: 600;
      font-size: 1rem;
      color: var(--text-primary);
    }

    .task-meta {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .task-badge {
      padding: 0.25rem 0.6rem;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .task-badge.farmakoterapi {
      background: rgba(217, 72, 72, 0.15);
      color: var(--farmakoterapi);
    }

    .task-badge.kommunikasjon {
      background: rgba(72, 120, 217, 0.15);
      color: var(--kommunikasjon);
    }

    .task-badge.lovverk {
      background: rgba(217, 165, 72, 0.15);
      color: var(--lovverk);
    }

    .timeline {
      position: relative;
      display: grid;
      grid-template-columns: repeat(16, 1fr);
      gap: 0.25rem;
      height: 60px;
      align-items: center;
    }

    .timeline-bar {
      position: absolute;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: grab;
      transition: all 0.2s ease;
      overflow: hidden;
      box-shadow: 0 2px 8px var(--shadow);
    }

    .timeline-bar:active {
      cursor: grabbing;
    }

    .timeline-bar:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px var(--shadow);
      z-index: 10;
    }

    .timeline-bar.farmakoterapi {
      background: linear-gradient(135deg, var(--farmakoterapi) 0%, #c43838 100%);
    }

    .timeline-bar.kommunikasjon {
      background: linear-gradient(135deg, var(--kommunikasjon) 0%, #3860c4 100%);
    }

    .timeline-bar.lovverk {
      background: linear-gradient(135deg, var(--lovverk) 0%, #c49038 100%);
    }

    .timeline-bar.arbeidskrav {
      background: linear-gradient(135deg, var(--apotek-primary) 0%, var(--apotek-secondary) 100%);
      height: 44px;
      font-size: 0.75rem;
    }

    .timeline-bar.milestone {
      background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%);
      height: 50px;
      border: 3px solid white;
      box-shadow: 0 4px 20px rgba(139, 92, 246, 0.4);
    }

    .phase-divider {
      position: absolute;
      left: calc(var(--week) * 6.25%);
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--apotek-accent);
      opacity: 0.3;
      pointer-events: none;
    }

    .progress-bar {
      background: var(--bg-dark);
      border-radius: 12px;
      height: 8px;
      margin-top: 2rem;
      overflow: hidden;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--apotek-primary), var(--apotek-accent));
      border-radius: 12px;
      transition: width 0.6s ease;
      position: relative;
      overflow: hidden;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.3),
        transparent
      );
      animation: shimmer 2s infinite;
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-top: 2rem;
    }

    .stat-card {
      background: white;
      padding: 1.5rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 12px var(--shadow);
      transition: transform 0.2s ease;
    }

    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 6px 24px var(--shadow);
    }

    .stat-value {
      font-size: 2.5rem;
      font-weight: 700;
      font-family: 'Playfair Display', serif;
      margin-bottom: 0.25rem;
    }

    .stat-label {
      color: var(--text-secondary);
      font-size: 0.85rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .legend {
      display: flex;
      gap: 2rem;
      justify-content: center;
      margin-top: 2rem;
      padding: 1.5rem;
      background: white;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .legend-color {
      width: 24px;
      height: 24px;
      border-radius: 6px;
    }

    .legend-label {
      font-weight: 600;
      font-size: 0.9rem;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 2rem;
      }

      .gantt-header,
      .gantt-row {
        grid-template-columns: 200px 1fr;
        gap: 1rem;
      }

      .controls {
        padding: 1.5rem;
      }

      .gantt-container {
        padding: 1rem;
      }
    }

    /* Dark Mode Toggle - Footer Right */
    .theme-toggle {
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      z-index: 10000;
      background: linear-gradient(135deg, #0f766e, #14b8a6);
      border: none;
      border-radius: 50%;
      width: 56px;
      height: 56px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(15, 118, 110, 0.3);
      transition: all 0.3s ease;
      user-select: none;
    }

    .theme-toggle:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 6px 20px rgba(15, 118, 110, 0.4);
    }

    .theme-toggle:active {
      transform: translateY(-1px) scale(0.98);
    }

    .theme-toggle-icon {
      font-size: 1.5rem;
      transition: transform 0.3s ease;
      line-height: 1;
    }

    .theme-toggle:hover .theme-toggle-icon {
      transform: rotate(20deg);
    }

    .theme-toggle-text {
      display: none;
    }

    /* Dark mode styling */
    body.dark-mode .theme-toggle {
      background: linear-gradient(135deg, #1e293b, #334155);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
    }

    body.dark-mode .theme-toggle:hover {
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.6);
    }

    /* Tablet & Mobile */
    @media (max-width: 1024px) {
      .theme-toggle {
        width: 50px;
        height: 50px;
      }
      
      .theme-toggle-icon {
        font-size: 1.3rem;
      }
    }

    @media (max-width: 768px) {
      .theme-toggle {
        width: 48px;
        height: 48px;
        bottom: 0.75rem;
        right: 0.75rem;
      }
      
      .theme-toggle-icon {
        font-size: 1.2rem;
      }
    }

    /* Sticky Footer */
    .sticky-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(135deg, #0f766e, #14b8a6);
      padding: 0.75rem 2rem;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.1);
      z-index: 999;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .footer-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .vitusapotek-logo {
      height: 35px;
      width: auto;
      background: white;
      padding: 4px 8px;
      border-radius: 6px;
    }

    .footer-text {
      color: white;
      font-weight: 600;
      font-size: 0.95rem;
    }

    body {
      padding-bottom: 75px;
    }

    @media (max-width: 768px) {
      .sticky-footer {
        padding: 0.6rem 1rem;
        flex-direction: column;
        gap: 0.5rem;
      }
      
      .vitusapotek-logo {
        height: 28px;
      }
      
      .footer-text {
        font-size: 0.85rem;
      }
      
      body {
        padding-bottom: 100px;
      }
    }

                        /* Countdown Widget */
    .countdown-widget {
      position: fixed;
      top: 80px;
      right: 2rem;
      z-index: 999;
      background: linear-gradient(135deg, #10b981, #14b8a6);
      border-radius: 12px;
      padding: 12px 16px;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
      min-width: 140px;
      text-align: center;
      color: white;
      transition: background 0.3s ease;
    }

    .countdown-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
      opacity: 0.95;
    }

    .countdown-number {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1;
      font-family: 'Manrope', sans-serif;
    }

    .countdown-text {
      font-size: 0.75rem;
      margin-top: 4px;
      opacity: 0.9;
    }

    .countdown-date {
      font-size: 0.65rem;
      margin-top: 4px;
      opacity: 0.8;
    }

    /* Tablet: Smaller, compact version */
    @media (max-width: 1024px) and (min-width: 769px) {
      .countdown-widget {
        top: 70px;
        right: 1rem;
        min-width: 110px;
        padding: 8px 12px;
      }
      
      .countdown-label {
        font-size: 0.6rem;
      }
      
      .countdown-number {
        font-size: 1.5rem;
      }
      
      .countdown-text {
        font-size: 0.65rem;
      }
      
      .countdown-date {
        font-size: 0.6rem;
      }
    }

    /* Mobile: Hide */
    @media (max-width: 768px) {
      .countdown-widget {
        display: none;
      }
    }

    /* ===================== DARK MODE ===================== */
    body.dark-mode {
      --bg: #0a0e1a;
      --bg-card: #131829;
      --text: #e8eaf5;
      --text-muted: #9ca3af;
      --border: #1e2337;
      --shadow: rgba(0, 0, 0, 0.3);
      --shadow-lg: rgba(0, 0, 0, 0.4);
      --primary: #14b8a6;
      --secondary: #06b6d4;
      
      background: linear-gradient(135deg, #0a0e1a 0%, #0f1219 100%) !important;
      color: #e8eaf5 !important;
    }

    body.dark-mode .top-nav {
      background: linear-gradient(135deg, #1e293b, #0f172a) !important;
      border-bottom: 1px solid var(--border);
    }

    body.dark-mode .activity-card,
    body.dark-mode .eqs-item,
    body.dark-mode .funksjon-card,
    body.dark-mode .period-card,
    body.dark-mode .task-card,
    body.dark-mode .course-card,
    body.dark-mode .phase-section,
    body.dark-mode .module-card {
      background: #131829 !important;
      border-color: #1e2337 !important;
      color: #e8eaf5 !important;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3) !important;
    }

    body.dark-mode .activity-card h3,
    body.dark-mode .activity-card h4,
    body.dark-mode .eqs-item h3,
    body.dark-mode .eqs-item h4,
    body.dark-mode .course-card h3,
    body.dark-mode .task-card h3,
    body.dark-mode .module-card h3 {
      color: #e8eaf5 !important;
    }

    body.dark-mode .activity-card p,
    body.dark-mode .eqs-item p,
    body.dark-mode .course-card p,
    body.dark-mode .task-card p {
      color: #9ca3af !important;
    }

    body.dark-mode .hero-header {
      background: linear-gradient(135deg, rgba(20, 184, 166, 0.1), rgba(6, 182, 212, 0.1)) !important;
    }

    body.dark-mode .search-input {
      background: var(--bg-card) !important;
      border-color: var(--border) !important;
      color: var(--text) !important;
    }

    body.dark-mode .overall-progress,
    body.dark-mode .timeline {
      background: var(--bg-card) !important;
      border-color: var(--border) !important;
    }

    body.dark-mode .quick-link-btn {
      background: var(--bg-card) !important;
      border: 1px solid var(--border) !important;
    }

    body.dark-mode .sticky-footer {
      background: linear-gradient(135deg, #1e293b, #0f172a) !important;
      border-top: 1px solid var(--border);
    }

    }

    body.dark-mode input[type="checkbox"]:checked {
      background: #14b8a6;
      border-color: #14b8a6;

    /* Toast Notifications */
    .toast {
      position: fixed;
      bottom: 100px;
      right: 24px;
      z-index: 10000;
      background: linear-gradient(135deg, #10b981, #14b8a6);
      color: white;
      font-size: 14px;
      font-weight: 600;
      padding: 14px 24px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0;
      transform: translateY(20px) scale(0.95);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
      box-shadow: 0 8px 24px rgba(16, 185, 129, 0.3);
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: all;
    }

    .toast.error {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      box-shadow: 0 8px 24px rgba(239, 68, 68, 0.3);
    }

    .toast-icon {
      font-size: 20px;
      line-height: 1;
    }

    @media (max-width: 768px) {
      .toast {
        bottom: 110px;
        right: 16px;
        left: 16px;
        padding: 12px 20px;
        font-size: 13px;
      }

    const SUPABASE_URL = 'https://gkfgdtxxcnryztllhzlh.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdrZmdkdHh4Y25yeXp0bGxoemxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNDI5MzgsImV4cCI6MjA4NzgxODkzOH0.mioTmWUvU8004rdef67gimpfs7ivypnZhBaAar_IBoc';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const STORAGE_KEY = 'ganttCompletedTasks';
    
    const RETRY_DELAYS = [5000, 10000, 30000, 60000];
    const MAX_AUTO_RETRIES = 10;
    let autoRetryAttempt = 0;
    let retryTimeoutId = null;
    let isSupabaseOnline = true;
    let hasPendingChanges = false;

    async function testSupabaseConnection() {
      try {
        const { data, error } = await supabaseClient.from('praksisplan_data').select('key').limit(1);
        if (!error) {
          if (!isSupabaseOnline) {
            console.log('✅ Supabase tilkobling gjenopprettet!');
            isSupabaseOnline = true;
            autoRetryAttempt = 0;
            if (hasPendingChanges) syncLocalDataToSupabase();
          }
          return true;
        }
        throw error;
      } catch (error) {
        if (isSupabaseOnline) console.warn('⚠️ Supabase utilgjengelig, bruker localStorage');
        isSupabaseOnline = false;
        scheduleAutoRetry();
        return false;
      }
    }

    function scheduleAutoRetry() {
      if (retryTimeoutId || autoRetryAttempt >= MAX_AUTO_RETRIES) {
        if (autoRetryAttempt >= MAX_AUTO_RETRIES) {
          console.log(`⏸️ Automatiske forsøk stoppet (${MAX_AUTO_RETRIES}/${MAX_AUTO_RETRIES})`);
        }
        return;
      }
      const delay = RETRY_DELAYS[Math.min(autoRetryAttempt, RETRY_DELAYS.length - 1)];
      console.log(`🔄 Auto-retry ${autoRetryAttempt + 1}/${MAX_AUTO_RETRIES} om ${delay/1000}s...`);
      retryTimeoutId = setTimeout(async () => {
        retryTimeoutId = null;
        autoRetryAttempt++;
        await testSupabaseConnection();
      }, delay);
    }

    async function retryOnDataChange() {
      hasPendingChanges = true;
      if (!isSupabaseOnline && autoRetryAttempt >= MAX_AUTO_RETRIES) {
        console.log('🔄 Ny endring - prøver Supabase igjen...');
        await testSupabaseConnection();
      }
    }

    async function syncLocalDataToSupabase() {
      const localData = localStorage.getItem(STORAGE_KEY);
      if (localData) {
        try {
          await supabaseClient.from('praksisplan_data').upsert({
            key: STORAGE_KEY,
            data: JSON.parse(localData),
            updated_at: new Date().toISOString()
          }, { onConflict: 'key' });
          console.log('✅ Gantt data synkronisert til Supabase');
          hasPendingChanges = false;
          if (window.opener && window.opener.triggerSupabaseRetry) {
            window.opener.triggerSupabaseRetry();
          }
        } catch (error) {
          console.error('Kunne ikke synkronisere:', error);
        }
      }
    }

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      if (!toast) return;
      
      const icon = type === 'success' ? '✓' : '⚠';
      toast.innerHTML = `<span class="toast-icon">${icon}</span><span>${message}</span>`;
      toast.className = 'toast' + (type === 'error' ? ' error' : '');

        setTimeout(() => {
          confetti({ ...config, origin: { x: 0, y: 0.6 } });
          confetti({ ...config, origin: { x: 1, y: 0.6 } });
        }, 250);
      }
    }

    // Check for milestones
    function checkMilestones(completedCount, totalCount) {
      const percentage = Math.round((completedCount / totalCount) * 100);
      const milestones = [25, 50, 75, 100];
      
      milestones.forEach(milestone => {
        const key = `milestone_${milestone}_shown`;
        if (percentage >= milestone && !sessionStorage.getItem(key)) {
          sessionStorage.setItem(key, 'true');
          showCelebration(milestone);
          
          if (milestone === 100) {
            fireConfetti('complete');
          } else {
            fireConfetti('milestone');
          }
        }
      });
    }

    // Show celebration message
    function showCelebration(milestone) {
      const messages = {
        25: '🎉 25% Fullført!',
        50: '🚀 Halvveis der!',
        75: '⭐ 75% Fullført!',
        100: '🏆 GRATULERER! 100%!'
      };
      
      const badge = document.createElement('div');
      badge.className = 'celebration-badge';
      badge.textContent = messages[milestone];
      document.body.appendChild(badge);
      
      setTimeout(() => badge.classList.add('show'), 100);
      
      setTimeout(() => {
        badge.classList.remove('show');
        setTimeout(() => badge.remove(), 500);
      }, 3000);
    }

    // Add ripple effect on click
    function createRipple(event) {
      const button = event.currentTarget;
      const ripple = document.createElement('span');
      const rect = button.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      const x = event.clientX - rect.left - size / 2;
      const y = event.clientY - rect.top - size / 2;
      
      ripple.className = 'ripple';
      ripple.style.width = ripple.style.height = size + 'px';
      ripple.style.left = x + 'px';
      ripple.style.top = y + 'px';
      
      button.style.position = 'relative';
      button.style.overflow = 'hidden';
      button.appendChild(ripple);
      
      setTimeout(() => ripple.remove(), 600);
    }

    // Apply to all clickable elements
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.activity-card, .eqs-item, .course-card, .task-card, .quick-link-btn, .module-link').forEach(el => {
        el.addEventListener('click', createRipple);
      });
    });
</script>

  <script>
    // Confetti celebration on milestones
    function celebrateCompletion(percentage) {
      if (percentage >= 100) {
        confetti({
          particleCount: 200,
          spread: 120,
          origin: { y: 0.6 }
        });
        setTimeout(() => {
          confetti({
            particleCount: 200,
            spread: 120,
            origin: { y: 0.6 }
          });
        }, 300);
      } else if (percentage >= 75 && !localStorage.getItem('celebrated75')) {
        confetti({
          particleCount: 100,
          spread: 70,
          origin: { y: 0.6 }
        });
        localStorage.setItem('celebrated75', 'true');
      } else if (percentage >= 50 && !localStorage.getItem('celebrated50')) {
        confetti({
          particleCount: 80,
          spread: 60,
          origin: { y: 0.6 }
        });
        localStorage.setItem('celebrated50', 'true');
      }
    }
  </script>
