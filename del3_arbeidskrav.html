  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <!-- Supabase Configuration med Smart Retry -->
  <script>
    const SUPABASE_URL = 'https://gkfgdtxxcnryztllhzlh.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdrZmdkdHh4Y25yeXp0bGxoemxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNDI5MzgsImV4cCI6MjA4NzgxODkzOH0.mioTmWUvU8004rdef67gimpfs7ivypnZhBaAar_IBoc';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const STORAGE_KEY = 'arbeidskravCompleted';
    
    const RETRY_DELAYS = [5000, 10000, 30000, 60000];
    const MAX_AUTO_RETRIES = 10;
    let autoRetryAttempt = 0;
    let retryTimeoutId = null;
    let isSupabaseOnline = true;
    let hasPendingChanges = false;

    async function testSupabaseConnection() {
      try {
        const { data, error } = await supabaseClient.from('praksisplan_data').select('key').limit(1);
        if (!error) {
          if (!isSupabaseOnline) {
            console.log('✅ Supabase tilkobling gjenopprettet!');
            isSupabaseOnline = true;
            autoRetryAttempt = 0;
            if (hasPendingChanges) syncLocalDataToSupabase();
          }
          return true;
        }
        throw error;
      } catch (error) {
        if (isSupabaseOnline) console.warn('⚠️ Supabase utilgjengelig, bruker localStorage');
        isSupabaseOnline = false;
        scheduleAutoRetry();
        return false;
      }
    }

    function scheduleAutoRetry() {
      if (retryTimeoutId || autoRetryAttempt >= MAX_AUTO_RETRIES) {
        if (autoRetryAttempt >= MAX_AUTO_RETRIES) {
          console.log(`⏸️ Automatiske forsøk stoppet (${MAX_AUTO_RETRIES}/${MAX_AUTO_RETRIES})`);
        }
        return;
      }
      const delay = RETRY_DELAYS[Math.min(autoRetryAttempt, RETRY_DELAYS.length - 1)];
      console.log(`🔄 Auto-retry ${autoRetryAttempt + 1}/${MAX_AUTO_RETRIES} om ${delay/1000}s...`);
      retryTimeoutId = setTimeout(async () => {
        retryTimeoutId = null;
        autoRetryAttempt++;
        await testSupabaseConnection();
      }, delay);
    }

    async function retryOnDataChange() {
      hasPendingChanges = true;
      if (!isSupabaseOnline && autoRetryAttempt >= MAX_AUTO_RETRIES) {
        console.log('🔄 Ny endring - prøver Supabase igjen...');
        await testSupabaseConnection();
      }
    }

    async function syncLocalDataToSupabase() {
      const localData = localStorage.getItem(STORAGE_KEY);
      if (localData) {
        try {
          await supabaseClient.from('praksisplan_data').upsert({
            key: STORAGE_KEY,
            data: JSON.parse(localData),
            updated_at: new Date().toISOString()
          }, { onConflict: 'key' });
          console.log('✅ Del 3 data synkronisert til Supabase');
          hasPendingChanges = false;
          if (window.opener && window.opener.triggerSupabaseRetry) {
            window.opener.triggerSupabaseRetry();
          }
        } catch (error) {
          console.error('Kunne ikke synkronisere:', error);
        }
      }
    }

    window.triggerSupabaseRetry = retryOnDataChange;
    testSupabaseConnection();
    

    // Countdown Calculator
    function updateCountdown() {
      const examDate = new Date('2026-05-15T09:00:00');
      const now = new Date();
      const diff = examDate - now;
      const daysLeft = Math.ceil(diff / (1000 * 60 * 60 * 24));
      
      const el = document.getElementById('days-left');
      if (el) {
        el.textContent = daysLeft > 0 ? daysLeft : 0;
      }
    }

    // Update immediately and every hour
    updateCountdown();
    setInterval(updateCountdown, 3600000);

    // Toast Notification System
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      if (!toast) return;
      
      const icon = type === 'success' ? '✓' : '⚠';
      toast.innerHTML = `<span class="toast-icon">${icon}</span><span>${message}</span>`;
      toast.className = 'toast' + (type === 'error' ? ' error' : '');
      
      setTimeout(() => toast.classList.add('show'), 100);
      
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    console.log('🚀 Del 3 - Supabase med smart retry');
  </script>
</head>

        week: 15,

    function ArbeidskravSection() {
      const [completedTasks, setCompletedTasks] = useState(new Set());
      const [loading, setLoading] = useState(true);

      React.useEffect(() => {
        async function loadData() {
          try {
            const { data } = await supabaseClient
              .from('praksisplan_data')
              .select('data')
              .eq('key', STORAGE_KEY)
              .single();

            if (data && data.data) {
              setCompletedTasks(new Set(data.data));
              localStorage.setItem(STORAGE_KEY, JSON.stringify(data.data));
              console.log(`✅ Lastet ${data.data.length} arbeidskrav fra Supabase`);
            } else {
              const localData = localStorage.getItem(STORAGE_KEY);
              if (localData) {
                setCompletedTasks(new Set(JSON.parse(localData)));
                console.log('📱 Lastet data fra localStorage');
              }
            }
          } catch (error) {
            const localData = localStorage.getItem(STORAGE_KEY);
            if (localData) setCompletedTasks(new Set(JSON.parse(localData)));
          } finally {
            setLoading(false);
          }
        }
        loadData();
      }, []);

      React.useEffect(() => {
        if (loading) return;
        const dataArray = Array.from(completedTasks);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(dataArray));
        
        async function save() {
          try {
            await supabaseClient.from('praksisplan_data').upsert({
              key: STORAGE_KEY,
              data: dataArray,
              updated_at: new Date().toISOString()
            }, { onConflict: 'key' });
            console.log('✅ Lagret til Supabase'); showToast('Lagret!');
          } catch (error) {
            console.warn('⚠️ Lagret lokalt');
            retryOnDataChange();
          }
        }
        save();
      }, [completedTasks, loading]);

      const toggleCompletion = (taskId) => {
        setCompletedTasks(prev => {
          const newSet = new Set(prev);
          if (newSet.has(taskId)) {
            newSet.delete(taskId);
          } else {
            newSet.add(taskId);
          }
          return newSet;
        });
      };

      const stats = useMemo(() => {
        const arbeidskravOnly = arbeidskravData.filter(t => t.type === 'arbeidskrav');
        const evalueringOnly = arbeidskravData.filter(t => t.type === 'evaluering');
        
        const totalAK = arbeidskravOnly.length;
        const completedAK = arbeidskravOnly.filter(t => completedTasks.has(t.id)).length;
        const progressAK = Math.round((completedAK / totalAK) * 100);
        
        const totalEval = evalueringOnly.length;
        const completedEval = evalueringOnly.filter(t => completedTasks.has(t.id)).length;
        
        const total = arbeidskravData.length;
        const completed = completedTasks.size;
        const progress = Math.round((completed / total) * 100);

        return { 
          total, completed, progress, 
          totalAK, completedAK, progressAK,
          totalEval, completedEval
        };
      }, [completedTasks]);

      const weeks = Array.from({ length: 16 }, (_, i) => i + 9);

      return (
        <>
          <nav className="top-nav">
            <div className="nav-container">
              <div className="nav-brand">🏥 Muhammad Asif - Praksisplan Apotekpraksis</div>
              <div className="nav-links">

                <a href="del1_egenomsorg_oppdatert.html" className="nav-link">🏥 Del 1</a>
                <a href="del2_reseptur.html" className="nav-link">💊 Del 2</a>
                <a href="del3_arbeidskrav.html" className="nav-link active">📝 Del 3</a>
                <a href="del4_kontinuerlige_aktiviteter.html" className="nav-link">📊 Del 4</a>
                <a href="del5_apokus.html" className="nav-link">🎓 Del 5</a>
                <a href="del6_vitusapotek_opplaering.html" class="nav-link">🏪 Del 6</a>
                <a href="gantt_apotekpraksis.html" className="nav-link">📅 Gantt</a>
              </div>
            </div>
          </nav>

        {loading ? (
          <div className="container" style={{ textAlign: 'center', paddingTop: '4rem' }}>
            <h2>🚀 Laster data...</h2>
          </div>
        ) : (
        <div className="container">
          <div className="header">
            <h1>Praksisplan Apotekpraksis</h1>
            <p className="subtitle">Vår 2026 • Uke 9-24</p>
          </div>

          <div className="section-card">
            <div className="section-header">
              <div className="section-title">
                <div className="section-icon">📝</div>
                <h2>Del 3: Arbeidskrav</h2>
              </div>
              <div className="section-badge">7 arbeidskrav + 2 evalueringer</div>
            </div>

            {/* Info Box */}
            <div className="info-box">
              <div className="info-box-title">
                ℹ️ Viktig informasjon
              </div>
              <div className="info-box-content">
                <strong>Alle 7 arbeidskrav må være godkjent</strong> for å kunne gå opp til eksamen. 
                I tillegg gjennomføres <strong>midtveisvurdering</strong> i uke 16 og 
                <strong>sluttvurdering</strong> i uke 24. Sluttvurderingen er grunnlag for 
                godkjenning som reseptarfarmasøyt.
              </div>
            </div>

            {/* Progress Section */}
            <div className="progress-section">
              <div className="progress-header">
                <span className="progress-label">Total framgang</span>
                <span className="progress-percentage">{stats.progress}%</span>
              </div>
              <div className="progress-bar-container">
                <div className="progress-bar-fill" style={{ width: `${stats.progress}%` }}></div>
              </div>
              <div className="progress-stats">
                <div className="stat-item">
                  <span className="stat-value">{stats.completedAK}/{stats.totalAK}</span>
                  <span className="stat-label">Arbeidskrav</span>
                </div>
                <div className="stat-item">
                  <span className="stat-value">{stats.completedEval}/{stats.totalEval}</span>
                  <span className="stat-label">Evalueringer</span>
                </div>
                <div className="stat-item">
                  <span className="stat-value">{stats.progressAK}%</span>
                  <span className="stat-label">AK Fullført</span>
                </div>
              </div>
            </div>

            {/* Gantt Chart */}
            <div className="gantt-container">
              <div className="gantt-grid">
                {/* Header */}
                <div className="gantt-header">
                  <div className="header-cell">Arbeidskrav & Evalueringer</div>
                  {weeks.map(week => (
                    <div key={week} className="header-cell">{week}</div>
                  ))}
                </div>

                {/* Tasks */}
                {arbeidskravData.map((task, index) => (
                  <div key={task.id} className="gantt-row">

                      <input

                        className="task-checkbox"
                        checked={completedTasks.has(task.id)}
                        onChange={() => toggleCompletion(task.id)}

                <span className="legend-label">Periode-overgang</span>
              </div>
            </div>
          </div>
        </div>
        )}
        </>

    ReactDOM.render(<ArbeidskravSection />, document.getElementById('root'));
  </script>
