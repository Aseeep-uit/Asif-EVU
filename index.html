  <script>
    const SUPABASE_URL = 'https://gkfgdtxxcnryztllhzlh.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdrZmdkdHh4Y25yeXp0bGxoemxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNDI5MzgsImV4cCI6MjA4NzgxODkzOH0.mioTmWUvU8004rdef67gimpfs7ivypnZhBaAar_IBoc';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    // Retry configuration
    const RETRY_DELAYS = [5000, 10000, 30000, 60000]; // 5s, 10s, 30s, 1min
    const MAX_AUTO_RETRIES = 10; // Max automatiske forsøk per session
    let autoRetryAttempt = 0;
    let retryTimeoutId = null;
    let isSupabaseOnline = true;
    let hasPendingChanges = false;

    // Test Supabase connection
    async function testSupabaseConnection() {
      try {
        const { data, error } = await supabaseClient
          .from('praksisplan_data')
          .select('key')
          .limit(1);
        
        if (!error) {
          if (!isSupabaseOnline) {
            console.log('✅ Supabase tilkobling gjenopprettet!');
            isSupabaseOnline = true;
            autoRetryAttempt = 0; // Reset counter når tilkobling er tilbake
            
            // Sync any pending localStorage data
            if (hasPendingChanges) {
              syncLocalDataToSupabase();
            }
          }
          return true;
        }
        throw error;
      } catch (error) {
        if (isSupabaseOnline) {
          console.warn('⚠️ Supabase utilgjengelig, bruker localStorage');
        }
        isSupabaseOnline = false;
        scheduleAutoRetry();
        return false;
      }
    }

    // Schedule automatic retry with exponential backoff (max 10 forsøk)
    function scheduleAutoRetry() {
      // Ikke schedule hvis vi allerede har et forsøk pågående
      if (retryTimeoutId) return;
      
      // Stopp automatiske forsøk etter MAX_AUTO_RETRIES
      if (autoRetryAttempt >= MAX_AUTO_RETRIES) {
        console.log(`⏸️ Automatiske forsøk stoppet (${MAX_AUTO_RETRIES}/${MAX_AUTO_RETRIES})`);
        console.log('💡 Vil prøve igjen ved neste dataendring eller side-refresh');
        return;
      }
      
      const delay = RETRY_DELAYS[Math.min(autoRetryAttempt, RETRY_DELAYS.length - 1)];
      console.log(`🔄 Auto-retry ${autoRetryAttempt + 1}/${MAX_AUTO_RETRIES} om ${delay/1000} sekunder...`);
      
      retryTimeoutId = setTimeout(async () => {
        retryTimeoutId = null;
        autoRetryAttempt++;
        await testSupabaseConnection();
      }, delay);
    }

    // Retry on data change (triggered by user action)
    async function retryOnDataChange() {
      hasPendingChanges = true;
      
      // Hvis Supabase er offline OG vi har nådd max auto-retries
      if (!isSupabaseOnline && autoRetryAttempt >= MAX_AUTO_RETRIES) {
        console.log('🔄 Ny endring detektert - prøver Supabase igjen...');
        
        // Test tilkobling umiddelbart ved brukerhandling
        const success = await testSupabaseConnection();
        
        if (!success) {
          // Start ny retry-syklus (resetter IKKE autoRetryAttempt)
          console.log('⚠️ Fortsatt offline - data lagret lokalt');
          console.log('💡 Prøv å refresh siden når internett er tilbake');
        }
      }
    }

    // Sync localStorage data to Supabase when connection restored
    async function syncLocalDataToSupabase() {
      const keys = ['egenomsorgsActivities', 'resepturActivities', 'arbeidskravCompleted', 
                    'continuousActivities', 'apokusCourses', 'ganttCompletedTasks'];
      
      console.log('📤 Synkroniserer lokal data til Supabase...');
      let syncedCount = 0;
      
      for (const key of keys) {
        const localData = localStorage.getItem(key);
        if (localData) {
          try {
            const parsed = JSON.parse(localData);
            await supabaseClient
              .from('praksisplan_data')
              .upsert({
                key: key,
                data: parsed,
                updated_at: new Date().toISOString()
              }, { onConflict: 'key' });
            syncedCount++;
          } catch (error) {
            console.error(`Kunne ikke synkronisere ${key}:`, error);
          }
        }
      }
      
      if (syncedCount > 0) {
        console.log(`✅ Synkroniserte ${syncedCount} datasett til Supabase`);
        hasPendingChanges = false;
        // Reload to show updated data
        setTimeout(() => window.location.reload(), 1000);
      }
    }

    // Listen for storage changes (når data endres i andre filer)
    window.addEventListener('storage', (e) => {
      if (e.key && ['egenomsorgsActivities', 'resepturActivities', 'arbeidskravCompleted', 
                    'continuousActivities', 'apokusCourses', 'ganttCompletedTasks'].includes(e.key)) {
        retryOnDataChange();
      }
    });

    // Expose retry function globally for other pages to call
    window.triggerSupabaseRetry = retryOnDataChange;

    // Initial connection test
    testSupabaseConnection();
    console.log('🚀 Supabase initialisert med smart auto-retry');
    console.log(`📊 Max automatiske forsøk: ${MAX_AUTO_RETRIES} per session`);
    console.log('💡 Ved endringer etter max forsøk: Prøver igjen umiddelbart');
  </script>

              const storageKey = module.storageKey || (module.id === 'del3' ? 'arbeidskravCompleted' : null);
              
              if (storageKey) {
                const { data, error } = await supabaseClient
                  .from('praksisplan_data')
                  .select('data')
                  .eq('key', storageKey)
                  .single();

                if (data && data.data) {
                  const parsed = data.data;
                  
                  // Del 1 & Del 2: Array of "periodId-activityIndex" strings
                  if (module.id === 'del1' || module.id === 'del2') {
                    completed = Array.isArray(parsed) ? parsed.length : 0;
                  }
                  // Del 3: Array of task IDs
                  else if (module.id === 'del3') {
                    completed = Array.isArray(parsed) ? parsed.length : 0;
                  }
                  // Del 4: Array of activities with count
                  else if (module.id === 'del4') {
                    completed = Array.isArray(parsed) ? parsed.filter(item => item.count > 0).length : 0;
                  }
                  // Del 5 & Gantt: Array of IDs
                  else if (module.id === 'del5' || module.id === 'gantt') {
                    completed = Array.isArray(parsed) ? parsed.length : 0;
                  }
                }
              }
            } catch (error) {
              console.log(`Supabase: Ingen data for ${module.id}, bruker localStorage fallback`);
              
              // Fallback to localStorage
              const storageKey = module.storageKey || (module.id === 'del3' ? 'arbeidskravCompleted' : null);
              if (storageKey) {
                const localData = localStorage.getItem(storageKey);
                if (localData) {
                  try {
                    const parsed = JSON.parse(localData);
                    
                    if (module.id === 'del1' || module.id === 'del2') {
                      completed = parsed.length;
                    } else if (module.id === 'del3') {
                      completed = parsed.length;
                    } else if (module.id === 'del4') {
                      completed = parsed.filter(item => item.count > 0).length;
                    } else if (module.id === 'del5' || module.id === 'gantt') {
                      completed = parsed.length;
                    }
                  } catch (e) {
                    console.error(`Error parsing localStorage for ${module.id}:`, e);
                  }
                }
              }
            }
            
            progress[module.id] = {
              completed,
              total: module.totalItems,
              percentage: Math.round((completed / module.totalItems) * 100)
            };
          }
          
          setModuleProgress(progress);
          setLoading(false);
        }
        
        loadProgress();
      }, []);

      // Subscribe to realtime changes
      React.useEffect(() => {
        const channel = supabaseClient
          .channel('praksisplan_changes')
          .on('postgres_changes', 
            { event: '*', schema: 'public', table: 'praksisplan_data' },
            () => {
              console.log('🔄 Data oppdatert - refresher dashboard...');
              // Reload progress when data changes
              window.location.reload();
            }
          )
          .subscribe();

        return () => {
          supabaseClient.removeChannel(channel);
        };
      }, []);

      const overallStats = useMemo(() => {
        const totalItems = modules.reduce((sum, m) => sum + m.totalItems, 0);
        const completedItems = Object.values(moduleProgress).reduce((sum, p) => sum + (p.completed || 0), 0);
        const overallPercentage = Math.round((completedItems / totalItems) * 100);
        
        return {
          totalItems,
          completedItems,
          overallPercentage,
          modulesStarted: Object.values(moduleProgress).filter(p => p.completed > 0).length
        };
      }, [moduleProgress]);

      return (
        <>
          <nav className="top-nav">
            <div className="nav-container">
              <div className="nav-brand">🏥 Muhammad Asif - Praksisplan Apotekpraksis</div>
              <div className="nav-links">
                <a href="index.html" className="nav-link active">📊 Oversikt</a>
                <a href="del1_egenomsorg_oppdatert.html" className="nav-link">🏥 Del 1</a>
                <a href="del2_reseptur.html" className="nav-link">💊 Del 2</a>
                <a href="del3_arbeidskrav.html" className="nav-link">📝 Del 3</a>
                <a href="del4_kontinuerlige_aktiviteter.html" className="nav-link">📊 Del 4</a>
                <a href="del5_apokus.html" className="nav-link">🎓 Del 5</a>
                <a href="gantt_apotekpraksis.html" className="nav-link">📅 Gantt</a>
              </div>
            </div>
          </nav>

        {loading ? (
          <div className="container" style={{ textAlign: 'center', paddingTop: '4rem' }}>
            <h2 style={{ color: 'var(--primary)' }}>🚀 Laster data fra Supabase...</h2>
          </div>
        ) : (
        <div className="container">
          <div className="hero-header">
            <div className="hero-content">
              <h1>🏥 Praksisplan Apotekpraksis</h1>
              <p className="hero-subtitle">FAR-2505 & FAR-6306 • Vår 2026 • Uke 9-24</p>
              
              <div className="hero-stats">
                <div className="hero-stat">
                  <span className="hero-stat-value">{overallStats.completedItems}</span>
                  <span className="hero-stat-label">Fullført</span>
                </div>
                <div className="hero-stat">
                  <span className="hero-stat-value">{overallStats.totalItems}</span>
                  <span className="hero-stat-label">Totalt</span>
                </div>
                <div className="hero-stat">
                  <span className="hero-stat-value">{overallStats.overallPercentage}%</span>
                  <span className="hero-stat-label">Framgang</span>
                </div>
                <div className="hero-stat">
                  <span className="hero-stat-value">{overallStats.modulesStarted}/5</span>
                  <span className="hero-stat-label">Deler startet</span>
                </div>
              </div>
            </div>
          </div>

          <div className="overall-progress">
            <div className="progress-title">📈 Total framgang</div>
            <div className="overall-progress-bar">
              <div 
                className="overall-progress-fill" 
                style={{ width: `${overallStats.overallPercentage}%` }}
              />
            </div>
            <div className="progress-percentage">
              {overallStats.completedItems} / {overallStats.totalItems} elementer fullført
            </div>
          </div>

          <div className="modules-grid">
            {modules.map(module => {
              const progress = moduleProgress[module.id] || { completed: 0, total: module.totalItems, percentage: 0 };
              
              return (
                <div key={module.id} className={`module-card ${module.id}`}>
                  <div className="module-header">
                    <div className="module-icon">{module.icon}</div>
                    <div className="module-badge">{module.totalItems} elementer</div>
                  </div>
                  
                  <h2 className="module-title">{module.title}</h2>
                  <p className="module-description">{module.description}</p>
                  
                  <div className="module-progress">
                    <div className="module-progress-bar">
                      <div 
                        className="module-progress-fill" 
                        style={{ width: `${progress.percentage}%` }}
                      />
                    </div>
                    <div className="module-stats">
                      <span>{progress.completed} / {progress.total} fullført</span>
                      <span>{progress.percentage}%</span>
                    </div>
                  </div>
                  
                  <a href={module.file} className="module-link" target="_blank" rel="noopener noreferrer">
                    Åpne {module.title} →
                  </a>
                </div>
              );
            })}
          </div>

          <div className="quick-links">
            <div className="quick-links-title">
              🔗 Hurtiglenker
            </div>
            <div className="links-grid">
              <a href="del1_egenomsorg_oppdatert.html" className="quick-link-btn" target="_blank" rel="noopener noreferrer">
                🏥 Egenomsorg
              </a>
              <a href="del2_reseptur.html" className="quick-link-btn" target="_blank" rel="noopener noreferrer">
                💊 Reseptur
              </a>
              <a href="del3_arbeidskrav.html" className="quick-link-btn" target="_blank" rel="noopener noreferrer">
                📝 Arbeidskrav
              </a>
              <a href="del4_kontinuerlige_aktiviteter.html" className="quick-link-btn" target="_blank" rel="noopener noreferrer">
                📊 Kontinuerlige
              </a>
              <a href="del5_apokus.html" className="quick-link-btn" target="_blank" rel="noopener noreferrer">
                🎓 Apokus
              </a>
              <a href="gantt_apotekpraksis.html" className="quick-link-btn" target="_blank" rel="noopener noreferrer">
                📅 Gantt-diagram
              </a>
            </div>
          </div>

          <div className="timeline">
            <div className="timeline-title">📅 Praksisperioder</div>
            <div className="timeline-periods">
              {[1, 2, 3, 4, 5, 6, 7, 8].map(period => (
                <div key={period} className="period-block">
                  <div className="period-number">P{period}</div>
                  <div className="period-weeks">
                    Uke {period * 2 + 7}-{period * 2 + 8}
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
        )}
        </>
      );
    }

    ReactDOM.render(<Dashboard />, document.getElementById('root'));
  </script>

  <!-- Sticky Footer -->
  <div class="sticky-footer">
    <div class="footer-left">
      <img src="Vitusapotek-logo.jpg" alt="Vitusapotek" class="vitusapotek-logo" onerror="this.style.display='none'">
      <span class="footer-text">📍 Vitusapotek Stovner</span>
    </div>
  </div>
</body>
</html>
