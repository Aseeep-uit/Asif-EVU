    function ApokusCourses() {
      const [completed, setCompleted] = useState(() => {
        const saved = localStorage.getItem('apokusCourses');
        return saved ? new Set(JSON.parse(saved)) : new Set();
      });

      const [searchTerm, setSearchTerm] = useState('');
      const [filterCompleted, setFilterCompleted] = useState('all');
      const [collapsedPeriods, setCollapsedPeriods] = useState(new Set());

      const toggleCourse = (code) => {
        const newCompleted = new Set(completed);
        if (newCompleted.has(code)) {
          newCompleted.delete(code);
        } else {
          newCompleted.add(code);
        }
        setCompleted(newCompleted);
        localStorage.setItem('apokusCourses', JSON.stringify([...newCompleted]));
      };

      const togglePeriod = (periodId) => {
        const newCollapsed = new Set(collapsedPeriods);
        if (newCollapsed.has(periodId)) {
          newCollapsed.delete(periodId);
        } else {
          newCollapsed.add(periodId);
        }
        setCollapsedPeriods(newCollapsed);
      };

      const filteredPeriods = useMemo(() => {
        return coursesData.map(period => {
          const filteredCourses = period.courses.filter(course => {
            const matchesSearch = searchTerm === '' ||
              course.code.toLowerCase().includes(searchTerm.toLowerCase()) ||
              course.title.toLowerCase().includes(searchTerm.toLowerCase());

            const matchesFilter =
              filterCompleted === 'all' ||
              (filterCompleted === 'completed' && completed.has(course.code)) ||
              (filterCompleted === 'pending' && !completed.has(course.code));

            return matchesSearch && matchesFilter;
          });

          return {
            ...period,
            courses: filteredCourses
          };
        }).filter(period => period.courses.length > 0);
      }, [searchTerm, filterCompleted, completed]);

      const stats = useMemo(() => {
        const totalCourses = coursesData.reduce((sum, p) => sum + p.courses.length, 0);
        const completedCount = completed.size;
        const progress = Math.round((completedCount / totalCourses) * 100);
        const periodsCompleted = coursesData.filter(period =>
          period.courses.every(c => completed.has(c.code))
        ).length;

        return {
          totalCourses,
          completedCount,
          progress,
          periodsCompleted,
          totalPeriods: coursesData.length
        };
      }, [completed]);

                  <span className="stat-value">{stats.periodsCompleted}/{stats.totalPeriods}</span>
                  <span className="stat-label">Perioder fullført</span>
                </div>
                <div className="stat-item">
                  <span className="stat-value">{stats.totalCourses - stats.completedCount}</span>
                  <span className="stat-label">Kurs gjenstår</span>
                </div>
              </div>
            </div>

            <div className="filter-controls">
              <div className="search-box">
                <span className="search-icon">🔍</span>
                <input
                  type="text"
                  className="search-input"
                  placeholder="Søk etter kurskode eller tittel..."
                  value={searchTerm}
                  onChange={(e) => setSearchTerm(e.target.value)}
                />
              </div>
              <button
                className={`filter-btn ${filterCompleted === 'all' ? 'active' : ''}`}
                onClick={() => setFilterCompleted('all')}
              >
                Alle kurs
              </button>
              <button
                className={`filter-btn ${filterCompleted === 'completed' ? 'active' : ''}`}
                onClick={() => setFilterCompleted('completed')}
              >
                Fullført
              </button>
              <button
                className={`filter-btn ${filterCompleted === 'pending' ? 'active' : ''}`}
                onClick={() => setFilterCompleted('pending')}
              >
                Gjenstående
              </button>
            </div>

            {filteredPeriods.map(period => (
              <div key={period.period} className="period-section">
                <div className="period-header" onClick={() => togglePeriod(period.period)}>
                  <div className="period-title">
                    <span className={`expand-icon ${collapsedPeriods.has(period.period) ? 'collapsed' : ''}`}>
                      ▼
                    </span>
                    {period.title}
                  </div>
                  <div className="period-badge">
                    {period.courses.filter(c => completed.has(c.code)).length}/{period.courses.length} fullført
                  </div>
                </div>
                <div className={`course-grid ${collapsedPeriods.has(period.period) ? 'collapsed' : ''}`}>
                  {period.courses.map(course => (
                    <div
                      key={course.code}
                      className={`course-card ${completed.has(course.code) ? 'completed' : ''}`}
                      onClick={() => toggleCourse(course.code)}
                    >
                      <div className="course-header">
                        <div className="course-code">{course.code}</div>
                        <input
                          type="checkbox"
                          className="course-checkbox"
                          checked={completed.has(course.code)}
                          onChange={() => toggleCourse(course.code)}
                          onClick={(e) => e.stopPropagation()}
                        />
                      </div>
                      <div className="course-title">{course.title}</div>
                      {completed.has(course.code) && (
                        <div className="completed-badge">✓ Fullført</div>
                      )}
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </div>
        </>
      );
    }

    ReactDOM.render(<ApokusCourses />, document.getElementById('root'));
  </script>
</body>
</html>
